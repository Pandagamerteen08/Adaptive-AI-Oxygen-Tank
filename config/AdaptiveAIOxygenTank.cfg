## =============================================================================
##  Advanced Robotic Voice Oxygen Tank - Tank Configuration
##  Edit this file to customise the mod's gameplay and AI behaviour.
## =============================================================================
##
##  ⚠  IMPORTANT — Two config files exist:
##
##     1. com.bipnx.subnautica.adaptiveaioxygentank.cfg  <- DO NOT EDIT
##        (BepInEx plugin file, auto-managed by the framework)
##
##     2. AdaptiveAIOxygenTank.cfg                       <- THIS FILE - edit here
##        (All gameplay settings live here)
##
##  Editing the BepInEx file can break the mod or prevent it from loading.
##  I recommend you do NOT edit that file. Use this one for all configuration.
## =============================================================================


[Item]

## Name shown in the inventory and crafting menu.
DisplayName = Advanced Robotic Voice Oxygen Tank

## Tooltip shown when hovering over the item.
Description = A high-capacity oxygen tank with an integrated AI voice assistant, emergency alerts, and adaptive dive monitoring.

## Inventory grid size.
InventoryWidth = 2
InventoryHeight = 3


[Assets]

## Path to the tank icon, relative to the plugin folder.
## Recommended size: 256x256 transparent PNG.
IconRelativePath = Assets/Icons/TankIcon.png

## Optional custom 3D model.
## Recommended format: Unity AssetBundle named adaptiveaioxygentank_model.
## The bundle should contain a GameObject prefab named TankModel.
ModelBundleRelativePath = Assets/Models/adaptiveaioxygentank_model
ModelPrefabName = TankModel


[Tank]

## Total oxygen capacity in units (vanilla Plasteel Tank = 300).
OxygenCapacity = 475

## When true, oxygen consumption is reduced at depth (see [Efficiency] tiers).
AdaptiveEfficiencyEnabled = true

## Enable a one-time emergency oxygen reserve per full refill.
EmergencyReserveEnabled = true

## Emergency oxygen reserve duration in approximate seconds.
EmergencyReserveSeconds = 8


[Progression]

## Set to true to unlock the blueprint immediately on game start.
UnlockAtStart = false

## The TechType whose discovery triggers the blueprint unlock.
## Default: Workbench (Modification Station).
## The tank is craftable ONLY at the Modification Station.
UnlockTechType = Workbench


[AI]

## Master switch for the AI voice / text system.
AIVoiceEnabled = false

## Show PDA-style text alerts for every voice line.
ShowTextAlerts = false

## Play custom OGG/WAV clips from Audio/VoiceLines when files exist.
PlayAudioClips = false

## Play supplemental WAV effects from Audio/SoundEffects when matching voice lines fire.
SoundEffectsEnabled = false

## Voice clip volume (0.0 – 1.0).
AudioVolume = 1.0

## Sound effect volume (0.0 – 1.0).
SoundEffectsVolume = 0.70

## ---------------------------------------------------------------------
##  Voice Settings
##  These control the accent and style of the AI voice.
## ---------------------------------------------------------------------

## Accent of the AI voice.
## Options: Robotic, American, British
## Default: American
VoiceAccent = American

## Voice folder variant.
## Options: Female, Male
## Default: Female
VoiceGender = Female

## Personality mode.
## Options: Professional, Friendly, Calm, Military, Sarcastic
PersonalityMode = Professional

## Voice pack folder under Audio/CustomVoicePacks, or BuiltIn.
VoicePackSelection = BuiltIn

## Alert preset.
## Options: Minimal, Standard, Immersive, Hardcore
AlertPreset = Standard

## Style preset for the AI voice.
##
##   Clean    — Natural, clear, neutral pace (default)
##   Robotic  — Slightly sharper and more synthetic sounding
##   Calm     — Slower and lower pitched, relaxed delivery
##   Crisp    — Faster and higher pitched, snappy delivery
##   Custom   — Uses the CustomVoicePitch value below
##
VoiceStyle = Clean

## Pitch multiplier used when VoiceStyle = Custom.
## 1.0 is normal. 0.5 is very low/slow, 2.0 is very high/fast.
CustomVoicePitch = 1.00



## Prefix prepended to all text alerts.
AIPrefix = AI Tank

## Seconds between periodic status update messages (while diving).
StatusUpdateIntervalSeconds = 180

## Ascent speed (m/s) that triggers a rapid-ascent warning.
RapidAscentMetersPerSecond = 7.5

## Cooldown (seconds) between rapid-ascent warnings.
RapidAscentCooldownSeconds = 30

## Minimum depth (m) required for periodic status messages to fire.
StatusMinimumDepth = 2

## Depth (m) at or above which the player is considered surfaced.
SurfaceDepth = 1


[AI Features]

## Announce when the player enters a new biome while swimming.
BiomeAnnouncementsEnabled = true

## Announce dive-duration milestones (5, 10, 20, 30, 45, 60 minutes).
DiveTimerEnabled = false

## Warn when remaining oxygen may not support a safe ascent.
ReturnEstimateEnabled = true

## O2 fraction (0–1) below which return-estimate warnings can trigger.
ReturnEstimateO2Threshold = 0.45

## Warn when diver health falls below threshold.
HealthWarningsEnabled = true

## Health percentage (0–100) that triggers a health warning.
HealthWarningThreshold = 40

## Warn when food or water drops below their respective thresholds.
FoodWaterWarningsEnabled = true

## Food percentage that triggers a nutrition warning.
FoodWarningThreshold = 25

## Water percentage that triggers a hydration warning.
WaterWarningThreshold = 25

## Warn at extreme water temperatures.
TemperatureWarningsEnabled = true

## Temperature (°C) above which a heat warning fires (near hydrothermal vents).
TemperatureHotThreshold = 40

## Temperature (°C) below which a cold warning fires.
TemperatureColdThreshold = 3


[AI Lines]

OxygenReserveLineFormat = Oxygen reserves at {0} units.
OxygenReserveAudioFile = oxygen_reserves.ogg

StatusEfficiencyLineFormat = {0} Efficiency profile: {1} percent oxygen use.

RapidAscentLine = Warning: rapid ascent detected.
RapidAscentAudioFile = rapid_ascent.ogg

SurfaceLine = Surface reached. Pressure normalized.
SurfaceAudioFile = surface_reached.ogg


[Recipe]
## Format: TechType:Amount
## All items are obtainable in early-to-mid game.
## Craftable ONLY at the Modification Station.

RecipeItem01 = TitaniumIngot:1
RecipeItem02 = PlasteelIngot:1
RecipeItem03 = Lithium:2
RecipeItem04 = Silver:2
RecipeItem05 = Gold:2
RecipeItem06 = Magnetite:2
RecipeItem07 = ComputerChip:1
RecipeItem08 = AdvancedWiringKit:2
RecipeItem09 = PowerCell:1


[Efficiency]
## Tiers are checked highest-depth first.
## 1.0 = normal O2 drain | 0.55 = only 55% drain (very efficient).

Tier01MinimumDepth = 1000
Tier01OxygenUseMultiplier = 0.55

Tier02MinimumDepth = 600
Tier02OxygenUseMultiplier = 0.65

Tier03MinimumDepth = 300
Tier03OxygenUseMultiplier = 0.75

Tier04MinimumDepth = 100
Tier04OxygenUseMultiplier = 0.88

Tier05MinimumDepth = 0
Tier05OxygenUseMultiplier = 1.00


