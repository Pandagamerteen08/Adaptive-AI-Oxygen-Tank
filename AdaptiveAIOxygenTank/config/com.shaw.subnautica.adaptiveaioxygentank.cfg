## Adaptive AI Oxygen Tank default configuration.
## This template is included with the mod package.
## BepInEx also creates/updates the active config at:
## Subnautica\BepInEx\config\com.shaw.subnautica.adaptiveaioxygentank.cfg


[Item]

DisplayName = Adaptive AI Oxygen Tank

Description = An advanced oxygen tank featuring an onboard artificial intelligence capable of dynamically regulating oxygen consumption based on depth, pressure, and respiratory demand.

InventoryWidth = 2

InventoryHeight = 3


[Assets]

## Recommended icon: 256x256 transparent PNG.
IconRelativePath = Assets/TankIcon.png


[Tank]

OxygenCapacity = 400

AdaptiveEfficiencyEnabled = true


[Progression]

UnlockAtStart = false

UnlockTechType = PlasteelIngot


[AI]

AIVoiceEnabled = true

ShowTextAlerts = true

PlayAudioClips = true

## Voice clips should be OGG Vorbis, 48 kHz, mono.
AudioVolume = 1.00

AIPrefix = AI Tank

StatusUpdateIntervalSeconds = 180

RapidAscentMetersPerSecond = 7.5

RapidAscentCooldownSeconds = 30

StatusMinimumDepth = 2

SurfaceDepth = 1


[AI Lines]

OxygenReserveLineFormat = Oxygen reserves at {0} units.

OxygenReserveAudioFile = oxygen_reserves.ogg

StatusEfficiencyLineFormat = {0} Efficiency profile: {1} percent oxygen use.

RapidAscentLine = Warning: rapid ascent detected.

RapidAscentAudioFile = rapid_ascent.ogg

SurfaceLine = Surface reached. Pressure normalized.

SurfaceAudioFile = surface_reached.ogg


[Recipe]

RecipeItem01 = Titanium:4

RecipeItem02 = Lithium:2

RecipeItem03 = Silver:2

RecipeItem04 = Gold:2

RecipeItem05 = CoralChunk:2

RecipeItem06 = ComputerChip:1

RecipeItem07 = WiringKit:1

RecipeItem08 = AdvancedWiringKit:2

RecipeItem09 = PlasteelIngot:1


[Efficiency]

Tier01MinimumDepth = 1000

Tier01OxygenUseMultiplier = 0.60

Tier02MinimumDepth = 600

Tier02OxygenUseMultiplier = 0.70

Tier03MinimumDepth = 300

Tier03OxygenUseMultiplier = 0.80

Tier04MinimumDepth = 100

Tier04OxygenUseMultiplier = 0.90

Tier05MinimumDepth = 0

Tier05OxygenUseMultiplier = 1.00


[AI Lines - Startup]

Line01AudioFile = startup_systems_online.ogg

Line01Text = Systems online.

Line02AudioFile = startup_adaptive_module.ogg

Line02Text = Adaptive breathing module activated.

Line03AudioFile = startup_life_support.ogg

Line03Text = Life-support AI initialized.

Line04AudioFile = startup_diagnostics.ogg

Line04Text = Respiratory diagnostics complete.

Line05AudioFile = startup_pressure.ogg

Line05Text = Pressure compensation active.


[AI Lines - Status]

Line01AudioFile = status_oxygen_stable.ogg

Line01Text = Oxygen reserves stable.

Line02AudioFile = status_efficiency_nominal.ogg

Line02Text = Respiratory efficiency nominal.

Line03AudioFile = status_depth_analysis.ogg

Line03Text = Depth analysis ongoing.

Line04AudioFile = status_life_support.ogg

Line04Text = Life-support stable.

Line05AudioFile = status_breathing_optimized.ogg

Line05Text = Breathing cycle optimized.


[Depth Milestones]

Line01Threshold = 100

Line01AudioFile = depth_100m.ogg

Line01Text = Passing 100 meters. Pressure increasing.

Line02Threshold = 300

Line02AudioFile = depth_300m.ogg

Line02Text = Entering deep-diving profile. Adaptive cycle intensified.

Line03Threshold = 500

Line03AudioFile = depth_500m.ogg

Line03Text = Passing 500 meters. Extreme-depth protocols engaged.

Line04Threshold = 1000

Line04AudioFile = depth_1000m.ogg

Line04Text = Entering abyssal range. Pressure compensation at maximum efficiency.

Line05Threshold = 1200

Line05AudioFile = depth_1200m.ogg

Line05Text = Neural optimization active. Deep-pressure stabilization complete.

Line06Threshold = 1400

Line06AudioFile = depth_1400m.ogg

Line06Text = High-pressure dive profile sustained.

Line07Threshold = 1600

Line07AudioFile = depth_1600m.ogg

Line07Text = Structural breathing support holding steady.

Line08Threshold = 1800

Line08AudioFile = depth_1800m.ogg

Line08Text = Extreme abyssal operation confirmed.

Line09Threshold = 2000

Line09AudioFile = depth_2000m.ogg

Line09Text = Two thousand meters. Maximum configured depth milestone reached.


[Oxygen Milestones]

Line01Threshold = 0.75

Line01AudioFile = oxygen_75.ogg

Line01Text = Oxygen at seventy-five percent.

Line02Threshold = 0.50

Line02AudioFile = oxygen_50.ogg

Line02Text = Oxygen at fifty percent.

Line03Threshold = 0.25

Line03AudioFile = oxygen_25.ogg

Line03Text = Caution: low oxygen.

Line04Threshold = 0.10

Line04AudioFile = oxygen_critical.ogg

Line04Text = Critical oxygen level. Immediate ascent advised.
