name: Aggregate Commit Batches and Notify Discord

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:        # manual trigger for testing

jobs:
  aggregate-and-notify:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true   # Opt into Node.js 24 for JS actions
    steps:
      - name: Download all commit-batch artifacts
        uses: actions/download-artifact@v4
        with:
          path: batches
          # downloads all artifacts; artifacts from recent pushes will appear here

      - name: Check for batch files
        id: check
        run: |
          if compgen -G "batches/*.json" > /dev/null; then
            echo "has_files=true" >> $GITHUB_OUTPUT
          else
            echo "has_files=false" >> $GITHUB_OUTPUT
          fi

      - name: Aggregate commits and build Discord payload
        if: steps.check.outputs.has_files == 'true'
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          COUNT=0
          DESC=""
          # Iterate all batch files and their commits
          for f in batches/*.json; do
            # For each commit object in the file
            jq -c '.commits[]' "$f" | while read -r commit; do
              HASH=$(echo "$commit" | jq -r '.id // .sha // empty')
              SHORT=${HASH:0:7}
              MSG=$(echo "$commit" | jq -r '.message' | sed -E ':a;N;s/\n/ /g;ta' | sed 's/"/\\"/g')
              URL=$(echo "$commit" | jq -r '.url // empty')
              AUTH=$(echo "$commit" | jq -r '.author.name // .author // .committer.name // "unknown"')
              ADDED=$(echo "$commit" | jq -r '.added | join(", ") // empty')
              MODIFIED=$(echo "$commit" | jq -r '.modified | join(", ") // empty')
              REMOVED=$(echo "$commit" | jq -r '.removed | join(", ") // empty')

              # Build a readable section for this commit
              if [ -n "$URL" ]; then
                DESC+="[\`$SHORT\`]($URL) $MSG - $AUTH\n"
              else
                DESC+="\`$SHORT\` $MSG - $AUTH\n"
              fi

              if [ -n "$ADDED" ]; then
                DESC+="• Added: $ADDED\n"
              fi
              if [ -n "$MODIFIED" ]; then
                DESC+="• Modified: $MODIFIED\n"
              fi
              if [ -n "$REMOVED" ]; then
                DESC+="• Removed: $REMOVED\n"
              fi

              DESC+="\n"
              COUNT=$((COUNT+1))
            done
          done

          # Optional: limit message size to avoid Discord limits (truncate description if necessary)
          MAX_CHARS=4000
          if [ ${#DESC} -gt $MAX_CHARS ]; then
            DESC="${DESC:0:$MAX_CHARS}\n\n(Truncated - too many commits/details)"
          fi

          TITLE="[$REPO] ${COUNT} new commit(s) in the last 5 minutes"
          # Create payload JSON safely with jq
          PAYLOAD=$(jq -n --arg title "$TITLE" --arg desc "$DESC" '{
            embeds: [{
              title: $title,
              description: $desc,
              color: 5814783
            }]
          }')

          echo "$PAYLOAD" > payload.json
          # Send to Discord
          curl -sS -H "Content-Type: application/json" -X POST --data-binary @payload.json "$DISCORD_WEBHOOK_URL"
          echo "Posted $COUNT commits to Discord."

      - name: Cleanup commit-batch artifacts (delete from repository artifacts list)
        if: steps.check.outputs.has_files == 'true'
        uses: geekyeggo/delete-artifact@v5
        with:
          name: commit-batch-*
          use_glob: true
          token: ${{ secrets.GITHUB_TOKEN }}
