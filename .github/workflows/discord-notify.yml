name: Notify Discord on Push

on:
  push:

jobs:
  notify-discord:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Send Discord Webhook
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMMIT_HASH: ${{ github.event.head_commit.id }}
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          COMMIT_URL: ${{ github.event.head_commit.url }}
          AUTHOR_NAME: ${{ github.event.head_commit.author.name }}
          AUTHOR_USERNAME: ${{ github.actor }}
          AUTHOR_AVATAR: https://avatars.githubusercontent.com/${{ github.actor }}
        run: |
          SHORT_HASH=$(echo $COMMIT_HASH | cut -c1-7)
          
          PAYLOAD=$(jq -n \
            --arg title "[$REPO:$BRANCH] 1 new commit" \
            --arg url "$COMMIT_URL" \
            --arg desc "[\`$SHORT_HASH\`]($COMMIT_URL) $COMMIT_MESSAGE - $AUTHOR_USERNAME" \
            --arg auth_name "$AUTHOR_NAME" \
            --arg auth_url "https://github.com/$AUTHOR_USERNAME" \
            --arg auth_icon "$AUTHOR_AVATAR" \
            '{
              embeds: [{
                title: $title,
                url: $url,
                description: $desc,
                color: 3707769,
                author: {
                  name: $auth_name,
                  url: $auth_url,
                  icon_url: $auth_icon
                }
              }]
            }')

          curl -H "Content-Type: application/json" \
               -X POST \
               -d "$PAYLOAD" \
               "$DISCORD_WEBHOOK_URL"
